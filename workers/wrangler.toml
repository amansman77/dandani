name = "dandani-api"
main = "src/index.js"
compatibility_date = "2024-03-18"

[[d1_databases]]
binding = "DB"
database_name = "dandani-db"
database_id = "89375d23-da59-4753-8cc7-56e23cf53294"

# 환경변수 설정
[vars]
# 디스코드 웹훅 URL (실제 값은 wrangler secret으로 설정)
# DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/YOUR/DISCORD/WEBHOOK"

# Cron Job 설정 (계정 전체 cron trigger 한도 5개를 이미 다른 프로젝트가 쓰고 있어 1개 슬롯만 사용)
# 09:00, 09:30, 22:00, 22:30 UTC에 트리거되고, 코드에서 시/분을 보고 실제 작업을 분기함
# - 09:00 UTC (KST 18:00) : 일일 보고서 전송
# - 22:30 UTC (KST 07:30) : 기획자 인사이트 전송
# - 09:30, 22:00 UTC      : no-op
[triggers]
crons = ["0,30 9,22 * * *"]